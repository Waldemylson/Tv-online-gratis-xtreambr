const listaPaisesDiv = document.getElementById("listaPaises");
const canaisContainer = document.getElementById("canaisContainer");
const tituloPaisDiv = document.getElementById("tituloPais");
const listaCanaisDiv = document.getElementById("listaCanais");
const btnVoltar = document.getElementById("btnVoltarPaises");

// Criar botões dos países
for (let pais in canaisPorPais) {
  const info = canaisPorPais[pais];
  const btn = document.createElement("div");
  btn.className = "btn-pais";
  btn.innerHTML = `<span class="flag">${info.flag}</span><span>${pais}</span>`;
  btn.onclick = (function(paisNome, canaisLista) {
    return function() { mostrarCanais(paisNome, canaisLista); };
  })(pais, info.canais);
  listaPaisesDiv.appendChild(btn);
}

function mostrarCanais(pais, canais) {
  listaPaisesDiv.style.display = "none";
  canaisContainer.style.display = "block";
  tituloPaisDiv.innerHTML = `${canaisPorPais[pais].flag} ${pais} (${canais.length} canais)`;
  listaCanaisDiv.innerHTML = "";
  
  canais.forEach(canal => {
    const item = document.createElement("div");
    item.className = "canal-item";
    item.innerHTML = `
      <span class="canal-nome">📺 ${canal.nome}</span>
      <span class="canal-assistir">▶ Assistir</span>
    `;
    item.onclick = function() { 
      if (canal.url && canal.url !== "#") {
        window.open(canal.url, "_blank");
      } else {
        alert("Link do canal indisponível no momento.");
      }
    };
    listaCanaisDiv.appendChild(item);
  });
  
  window.scrollTo(0, 0);
}

function voltarPaises() {
  listaPaisesDiv.style.display = "grid";
  canaisContainer.style.display = "none";
}

btnVoltar.onclick = voltarPaises;
</script>
