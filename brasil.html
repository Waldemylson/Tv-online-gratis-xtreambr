<title>📺 Meus Canais | TV Online</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
}

header {
    background: linear-gradient(90deg, #ff6600, #ff3300);
    padding: 20px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    position: sticky;
    top: 0;
    z-index: 100;
}

header h1 {
    font-size: 1.8rem;
    letter-spacing: 2px;
}

header p {
    opacity: 0.9;
    font-size: 0.85rem;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

/* MENU CATEGORIAS */
.menu-categorias {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 30px;
    position: sticky;
    top: 80px;
    background: rgba(0,0,0,0.8);
    padding: 10px;
    border-radius: 50px;
    backdrop-filter: blur(10px);
    z-index: 99;
}

.btn-cat {
    background: #1e1e3a;
    border: none;
    color: #ff6600;
    padding: 8px 20px;
    font-size: 0.9rem;
    font-weight: bold;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-cat:hover {
    background: #ff6600;
    color: #fff;
    transform: scale(1.05);
}

.btn-cat.ativo {
    background: #ff6600;
    color: #fff;
    box-shadow: 0 0 15px rgba(255,102,0,0.5);
}

/* ÁREA DOS CANAIS */
.canais-area {
    background: rgba(0,0,0,0.5);
    border-radius: 20px;
    padding: 25px;
    min-height: 500px;
    border: 1px solid rgba(255,102,0,0.3);
}

.titulo-cat {
    font-size: 1.6rem;
    margin-bottom: 25px;
    padding-bottom: 10px;
    border-bottom: 3px solid #ff6600;
    display: inline-block;
}

.grade-canais {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
}

.canal-link {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #1e1e3a;
    color: #fff;
    text-decoration: none;
    padding: 12px 15px;
    border-radius: 12px;
    border-left: 4px solid #ff6600;
    transition: all 0.2s ease;
}

.canal-link:hover {
    background: #2a2a4a;
    transform: translateX(5px);
    border-left-width: 8px;
}

.canal-logo {
    width: 36px;
    height: 36px;
    object-fit: contain;
    border-radius: 6px;
    background: #0a0a0a;
    padding: 4px;
}

.canal-nome {
    flex: 1;
    font-size: 0.9rem;
    font-weight: 500;
}

.sem-canais {
    text-align: center;
    padding: 50px;
    color: #888;
    font-size: 1.2rem;
}

.info-box {
    background: rgba(255,102,0,0.1);
    border: 1px solid #ff6600;
    padding: 12px;
    border-radius: 12px;
    margin-top: 30px;
    text-align: center;
    font-size: 0.8rem;
}

.stats {
    font-size: 0.8rem;
    color: #ff9966;
    margin-top: 5px;
}

@media (max-width: 768px) {
    .btn-cat { padding: 6px 14px; font-size: 0.75rem; }
    .grade-canais { grid-template-columns: 1fr; }
    .titulo-cat { font-size: 1.3rem; }
    .canal-logo { width: 28px; height: 28px; }
}
</style>

// FUNÇÃO PARA EXIBIR CANAIS
function exibirCategoria(categoriaId) {
    const area = document.getElementById('canaisArea');
    const dados = canais[categoriaId];
    
    if (!dados || dados.lista.length === 0) {
        area.innerHTML = '<div class="sem-canais">⚠️ Nenhum canal encontrado nesta categoria</div>';
        return;
    }
    
    let html = `<div class="titulo-cat">${dados.nome} <span class="stats">(${dados.lista.length} canais)</span></div>`;
    html += '<div class="grade-canais">';
    
    dados.lista.forEach(canal => {
        const logoUrl = canal.logo && canal.logo !== '#' ? canal.logo : 'https://via.placeholder.com/36x36?text=TV';
        const url = canal.url !== '#' ? canal.url : '#';
        const onclick = url !== '#' ? `window.open('${url}', '_blank')` : 'alert(\'Link indisponível no momento\')';
        
        html += `
            <div class="canal-link" onclick="${onclick}" style="cursor:pointer">
                <img src="${logoUrl}" class="canal-logo" onerror="this.src='https://via.placeholder.com/36x36?text=TV'">
                <span class="canal-nome">📺 ${canal.nome}</span>
            </div>
        `;
    });
    
    html += '</div>';
    area.innerHTML = html;
}

// FUNÇÃO PARA EXIBIR TODOS OS CANAIS
function exibirTodos() {
    let total = 0;
    let html = `<div class="titulo-cat">⭐ TODOS OS CANAIS</div>`;
    html += '<div class="grade-canais">';
    
    Object.keys(canais).forEach(cat => {
        canais[cat].lista.forEach(canal => {
            total++;
            const logoUrl = canal.logo && canal.logo !== '#' ? canal.logo : 'https://via.placeholder.com/36x36?text=TV';
            const url = canal.url !== '#' ? canal.url : '#';
            const onclick = url !== '#' ? `window.open('${url}', '_blank')` : 'alert(\'Link indisponível no momento\')';
            
            html += `
                <div class="canal-link" onclick="${onclick}" style="cursor:pointer">
                    <img src="${logoUrl}" class="canal-logo" onerror="this.src='https://via.placeholder.com/36x36?text=TV'">
                    <span class="canal-nome">📺 ${canal.nome}</span>
                </div>
            `;
        });
    });
    
    html += '</div>';
    html += `<div class="stats" style="text-align:center; margin-top:15px">📊 Total: ${total} canais disponíveis</div>`;
    document.getElementById('canaisArea').innerHTML = html;
}

// CONFIGURAR MENU
document.querySelectorAll('.btn-cat').forEach(botao => {
    botao.addEventListener('click', function() {
        document.querySelectorAll('.btn-cat').forEach(btn => btn.classList.remove('ativo'));
        this.classList.add('ativo');
        const categoria = this.getAttribute('data-cat');
        
        if (categoria === 'todos') {
            exibirTodos();
        } else {
            exibirCategoria(categoria);
        }
    });
});

// ABRIR COM CATEGORIA "TODOS" PADRÃO
document.addEventListener('DOMContentLoaded', () => {
    document.querySelector('.btn-cat[data-cat="todos"]').classList.add('ativo');
    exibirTodos();
});
