<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canais Adultos - XTREAMBR TV</title>
  <style>
    body { 
      background:#000; 
      color:#0f0; 
      font-family:Arial, sans-serif; 
      text-align:center; 
      padding:20px; 
      margin:0; 
    }
    h1 { 
      color:#ff0; 
      margin-bottom: 30px;
    }
    p { 
      margin: 18px 0; 
      font-size: 1.45em;
    }
    a { 
      color:#0f0; 
      text-decoration:none; 
    }
    a:hover { 
      color:#ff0; 
      text-decoration:underline; 
    }

    /* Player em tela cheia */
    #player-container { 
      display:none; 
      position:fixed; 
      inset:0; 
      background:#000; 
      z-index:9999; 
    }
    video { 
      width:100%; 
      height:100%; 
      background:#000; 
    }
    button.fechar { 
      position:absolute; 
      top:15px; 
      right:15px; 
      z-index:10; 
      padding:10px 20px; 
      background:#222; 
      color:#fff; 
      border:2px solid #555; 
      font-size:16px; 
      cursor:pointer; 
      border-radius:8px; 
    }

    .controles {
      margin-top: 50px;
    }
    button.voltar {
      padding:12px 26px;
      font-size:16px;
      background:#ff0000;
      color:#fff;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin: 0 10px;
    }
    button.home {
      padding:12px 26px;
      font-size:16px;
      background:#00aa00;
      color:#fff;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h1>Canais Adultos - XTREAMBR TV</h1>
<p style="color:#ff0; font-size:1.2em;">Clique no nome do canal para assistir</p>

<div id="lista-canais">
  <!-- Canais carregados aqui -->
</div>

<!-- Player Nativo -->
<div id="player-container">
  <button class="fechar" onclick="fecharPlayer()">FECHAR ✖</button>
  <video id="videoPlayer" controls autoplay></video>
</div>

<div class="controles">
  <button class="voltar" onclick="history.back()">🔙 Voltar</button>
  <a href="index.html">
    <button class="home">🏠 Home</button>
  </a>
</div>

<script>
// URL do seu arquivo Dirty.m3u
const m3uUrl = "https://gist.githubusercontent.com/vilumets/303e8130577b5e2471c060ff55792ab0/raw/8d82b2e380959dcb4222f3f437e9c76f7df814fc/Dirty.m3u";

const videoPlayer = document.getElementById('videoPlayer');
const playerContainer = document.getElementById('player-container');
const listaCanais = document.getElementById('lista-canais');

async function carregarCanais() {
  try {
    const response = await fetch(m3uUrl);
    const text = await response.text();
    const lines = text.split('\n');

    let name = '';
    
    for (let line of lines) {
      line = line.trim();
      
      if (line.startsWith('#EXTINF:')) {
        name = line.split(',').pop().trim();
      } 
      else if (line && !line.startsWith('#') && name) {
        const p = document.createElement('p');
        p.innerHTML = `
          <a href="#" onclick="abrir('${line}'); return false;">${name}</a>
        `;
        listaCanais.appendChild(p);
        name = '';
      }
    }
  } catch (e) {
    listaCanais.innerHTML = `<p style="color:red;">Erro ao carregar a lista de canais.</p>`;
  }
}

function abrir(url) {
  videoPlayer.src = url;
  playerContainer.style.display = 'block';
  videoPlayer.play().catch(() => {});
}

function fecharPlayer() {
  videoPlayer.pause();
  videoPlayer.src = '';
  playerContainer.style.display = 'none';
}

// Carrega os canais ao abrir a página
carregarCanais();
</script>

</body>
</html>
