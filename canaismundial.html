<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">

  <title>Canais por País - Jundial</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #000;
      color: #0f0;
      font-family: Arial, sans-serif;
      padding: 20px;
      min-height: 100vh;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      color: #0f0;
      font-size: 1.8rem;
    }
    .header p {
      color: #aaa;
      font-size: 0.9rem;
      margin-top: 5px;
    }
    .back-home {
      display: inline-block;
      background: #001a00;
      border: 1px solid #0f0;
      color: #0f0;
      padding: 10px 20px;
      border-radius: 25px;
      text-decoration: none;
      margin-bottom: 20px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .back-home:hover {
      background: #0f0;
      color: #000;
    }
    .grid-paises {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px;
      margin: 25px 0;
    }
    .btn-pais {
      background: #0a0a0a;
      border: 2px solid #0f0;
      border-radius: 14px;
      padding: 18px 10px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1rem;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .btn-pais:hover {
      background: #0f0;
      color: #000;
      transform: scale(1.02);
    }
    .btn-pais .flag {
      font-size: 2rem;
    }
    .canais-container {
      margin-top: 20px;
    }
    .btn-voltar-paises {
      background: #001a00;
      border: 1px solid #0f0;
      color: #0f0;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-voltar-paises:hover {
      background: #0f0;
      color: #000;
    }
    .titulo-pais {
      color: #ff0;
      font-size: 1.4rem;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #0f0;
    }
    .lista-canais {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .canal-item {
      background: #0a0a0a;
      border-radius: 10px;
      padding: 12px 15px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
      border-left: 4px solid #0f0;
    }
    .canal-item:hover {
      background: #0f0;
      color: #000;
    }
    .canal-nome {
      font-size: 1rem;
      font-weight: bold;
    }
    .canal-assistir {
      background: rgba(0,255,0,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    .canal-item:hover .canal-assistir {
      background: #000;
      color: #0f0;
    }
    .sem-canais {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #333;
      color: #666;
      font-size: 0.8rem;
    }
    @media (max-width: 600px) {
      .grid-paises { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
      .btn-pais { padding: 12px 5px; font-size: 0.9rem; }
      .canal-item { flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>

<div class="header">

// =====================================================
// LÓGICA DA PÁGINA
// =====================================================

const listaPaisesDiv = document.getElementById("listaPaises");
const canaisContainer = document.getElementById("canaisContainer");
const tituloPaisDiv = document.getElementById("tituloPais");
const listaCanaisDiv = document.getElementById("listaCanais");
const btnVoltar = document.getElementById("btnVoltarPaises");

async function carregarCanaisDoPais(pais, url) {
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const conteudo = await response.text();
    
    const linhas = conteudo.split('\n');
    const canais = [];
    let nomeAtual = "";
    
    for (const linha of linhas) {
      if (linha.startsWith('#EXTINF:')) {
        const match = linha.match(/,([^,]+)$/);
        if (match) {
          nomeAtual = match[1].trim();
        }
      } else if (linha.startsWith('http') && nomeAtual) {
        canais.push({ nome: nomeAtual, url: linha.trim() });
        nomeAtual = "";
      }
    }
    
    return canais;
  } catch (error) {
    console.error(`Erro ao carregar ${pais}:`, error);
    return [];
  }
}

async function mostrarCanais(pais, info) {
  listaPaisesDiv.style.display = "none";
  canaisContainer.style.display = "block";
  tituloPaisDiv.innerHTML = `${info.flag} ${pais} - Carregando canais...`;
  listaCanaisDiv.innerHTML = '<div class="sem-canais">🔄 Carregando lista de canais...</div>';
  
  const canais = await carregarCanaisDoPais(pais, info.url);
  
  if (canais.length === 0) {
    listaCanaisDiv.innerHTML = '<div class="sem-canais">❌ Nenhum canal encontrado ou erro ao carregar.</div>';
    tituloPaisDiv.innerHTML = `${info.flag} ${pais} (0 canais)`;
    return;
  }
  
  tituloPaisDiv.innerHTML = `${info.flag} ${pais} (${canais.length} canais)`;
  listaCanaisDiv.innerHTML = "";
  
  canais.forEach(canal => {
    const item = document.createElement("div");
    item.className = "canal-item";
    item.innerHTML = `
      <span class="canal-nome">📺 ${canal.nome}</span>
      <span class="canal-assistir">▶ Assistir</span>
    `;
    item.onclick = function() { 
      if (canal.url && canal.url !== "#") {
        window.open(canal.url, "_blank");
      } else {
        alert("Link do canal indisponível no momento.");
      }
    };
    listaCanaisDiv.appendChild(item);
  });
  
  window.scrollTo(0, 0);
}

for (let pais in canaisPorPais) {
  const info = canaisPorPais[pais];
  const btn = document.createElement("div");
  btn.className = "btn-pais";
  btn.innerHTML = `<span class="flag">${info.flag}</span><span>${pais}</span>`;
  btn.onclick = (function(paisNome, infoPais) {
    return function() { mostrarCanais(paisNome, infoPais); };
  })(pais, info);
  listaPaisesDiv.appendChild(btn);
}

function voltarPaises() {
  listaPaisesDiv.style.display = "grid";
  canaisContainer.style.display = "none";
}

btnVoltar.onclick = voltarPaises;
